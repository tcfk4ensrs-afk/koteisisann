  width: 100%;
  height: 100%;

}

@media (orientation: landscape) {

<body class="bg-slate-100 text-slate-900 min-h-screen">
  <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-lg font-bold leading-tight">固定資産棚卸し</h1>

        </div>
        <div class="text-right text-xs text-slate-300">
          <div id="assetCountLabel">資産 0</div>
          <div id="photoCountLabel">写真 0</div>
        </div>
      </div>
    </header>

    <main class="flex-1 px-4 py-3 space-y-3 overflow-y-auto">

      <!-- 注意表示 -->
      <section id="secureWarning" class="hidden rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-xs text-amber-900">
        カメラ利用には HTTPS または localhost 環境が必要な場合があります。カメラが起動しない場合は、社内WebサーバーやOneDrive/SharePoint等のHTTPS環境から開いてください。
      </section>

      <!-- ① カメラエリア -->

        <div class="flex items-center justify-between mb-2">

        <div id="reader" class="w-full aspect-video bg-slate-900 rounded-xl overflow-hidden flex items-center justify-center">
          <div class="text-slate-300 text-sm">カメラ映像</div>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-3">
          <button id="startCameraBtn" class="rounded-lg bg-blue-600 text-white py-2.5 font-bold active:scale-[0.99]">
            カメラ起動
          </button>
          <button id="stopCameraBtn" class="rounded-lg bg-slate-600 text-white py-2.5 font-bold active:scale-[0.99]">
            カメラ停止
          </button>
        </div>
      </section>

      <!-- ② 入力・確定エリア -->
      <section class="rounded-xl border border-slate-200 bg-white p-3">
        <h2 class="font-bold text-sm mb-2">② 資産番号入力・撮影</h2>

        <label for="assetNo" class="block text-xs font-bold text-slate-600 mb-1">資産番号</label>
        <input id="assetNo" type="text" inputmode="text" autocomplete="off"
               class="w-full rounded-lg border border-slate-300 px-3 py-3 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="QR読取または手入力" />

        <div class="flex items-center justify-between mt-2 text-sm">
          <div class="text-slate-600">この資産の撮影枚数</div>
          <div id="currentAssetPhotoCount" class="font-bold text-lg text-blue-700">0 枚</div>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-3">
          <button id="captureBtn" class="rounded-lg bg-emerald-600 text-white py-3 font-bold active:scale-[0.99]">
            写真を撮影
          </button>
          <button id="nextAssetBtn" class="rounded-lg bg-white border border-slate-300 text-slate-800 py-3 font-bold active:scale-[0.99]">
            次の資産へ

        <div id="message" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      </section>

      <!-- ③ 実績リストエリア -->
      <section class="rounded-xl border border-slate-200 bg-white p-3">
        <div class="flex items-center justify-between mb-2">
          <h2 class="font-bold text-sm">③ 実績リスト</h2>
          <span id="recordCount" class="text-xs text-slate-500">0件</span>
        </div>
        <div id="historyList" class="space-y-2 max-h-48 overflow-y-auto">
          <div class="text-sm text-slate-400 text-center py-6">撮影履歴はまだありません</div>
        </div>
      </section>

      <!-- ④ アクションエリア -->
      <section class="rounded-xl border border-slate-200 bg-slate-50 p-3 safe-bottom">
        <h2 class="font-bold text-sm mb-2">④ 出力・リセット</h2>
        <button id="exportZipBtn" class="w-full rounded-lg bg-indigo-700 text-white py-3 font-bold active:scale-[0.99] disabled:bg-slate-400">
          棚卸しデータを全出力 (Zip)
        </button>
        <button id="resetBtn" class="w-full mt-2 text-sm text-red-600 underline py-2">
          全データをリセット
        </button>
      </section>
    </main>
    <!-- Capture Screen -->

<div
  id="captureModal"
  class="hidden fixed inset-0 bg-black z-50"
>

  <div class="h-full flex flex-col">

    <div
      class="flex items-center justify-between
             text-white p-3"
    >

      <div

        Asset

          rounded
        "

        Close
      </button>

    </div>

    <div

        flex-1
        flex
        items-center
        justify-center
      "
    >

      <video
        id="captureVideo"
        autoplay
        playsinline
        class="
          w-full
          h-full
          object-contain
        "
      ></video>

    </div>

    <div class="p-5">

      <button
        id="shutterBtn"
        class="
          w-24
          h-24
          rounded-full

          mx-auto

        "
      ></button>

</div>
  </div>

  <script>
    // ==========================================
    // 固定資産棚卸しシステム - 完全クライアントサイド版
    // ==========================================

    let html5QrCode = null;
    let isCameraRunning = false;
    let captureStream = null;

    // 棚卸しデータはブラウザメモリ上のみ保持する
    let inventoryRecords = []; // { assetNo, seq, fileName, datetime }
    let imageStore = [];       // { assetNo, seq, fileName, blob, datetime }
    let assetCounters = {};    // { [assetNo]: count }
// IndexedDB

let db = null;

const DB_NAME = 'FixedAssetInventory';
const DB_VERSION = 1;
const STORE_NAME = 'records';
    const readerId = 'reader';

    const els = {
      secureWarning: document.getElementById('secureWarning'),
      cameraStatus: document.getElementById('cameraStatus'),
      startCameraBtn: document.getElementById('startCameraBtn'),
      stopCameraBtn: document.getElementById('stopCameraBtn'),
      assetNo: document.getElementById('assetNo'),
      currentAssetPhotoCount: document.getElementById('currentAssetPhotoCount'),
      captureBtn: document.getElementById('captureBtn'),
      nextAssetBtn: document.getElementById('nextAssetBtn'),
      message: document.getElementById('message'),
      historyList: document.getElementById('historyList'),
      recordCount: document.getElementById('recordCount'),
      assetCountLabel: document.getElementById('assetCountLabel'),
      photoCountLabel: document.getElementById('photoCountLabel'),
      exportZipBtn: document.getElementById('exportZipBtn'),
      resetBtn: document.getElementById('resetBtn'),
    };

    (async () => {
  await init();
})();

    async function init() {

  await initDB();

  await restoreData();

  if (
    !window.isSecureContext &&
    location.hostname !== 'localhost' &&
    location.hostname !== '127.0.0.1'
  ) {
    els.secureWarning.classList.remove('hidden');
  }

  bindEvents();

  updateUi();
}
    async function initDB() {

  return new Promise((resolve, reject) => {

    const request =
      indexedDB.open(
        DB_NAME,
        DB_VERSION
      );

    request.onupgradeneeded =
      event => {

        const database =
          event.target.result;

        if (
          !database.objectStoreNames.contains(
            STORE_NAME
          )
        ) {

          database.createObjectStore(
            STORE_NAME,
            {
              keyPath: 'id',
              autoIncrement: true
            }
          );

        }

      };

    request.onsuccess =
      event => {

        db =
          event.target.result;

        resolve();

      };

    request.onerror =
      () => reject(
        request.error
      );

  });

}
    async function saveRecordToDB(data) {

  return new Promise((resolve, reject) => {

    const tx =
      db.transaction(
        STORE_NAME,
        'readwrite'
      );

    const store =
      tx.objectStore(
        STORE_NAME
      );

    const req =
      store.add(data);

    req.onsuccess =
      () => resolve();

    req.onerror =
      () => reject(req.error);

  });

}
    async function restoreData() {

  return new Promise((resolve, reject) => {

    const tx =
      db.transaction(
        STORE_NAME,
        'readonly'
      );

    const store =
      tx.objectStore(
        STORE_NAME
      );

    const req =
      store.getAll();

    req.onsuccess = () => {

      const result =
        req.result || [];

      inventoryRecords = [];
      imageStore = [];
      assetCounters = {};

      result.forEach(item => {

        inventoryRecords.push(
          item.record
        );

        imageStore.push(
          item.image
        );

        assetCounters[
          item.record.assetNo
        ] = Math.max(
          assetCounters[
            item.record.assetNo
          ] || 0,
          item.record.seq
        );

      });

      resolve();

    };

    req.onerror =
      () => reject(req.error);

  });

}
async function openCaptureScreen() {

  const assetNo =
    els.assetNo.value.trim();

  if (!assetNo) {

    showMessage(
      '資産番号を入力してください',
      'error'
    );

    return;
  }

  document
    .getElementById(
      'captureAssetLabel'
    )
    .textContent =
    assetNo;

  document
    .getElementById(
      'captureModal'
    )
    .classList
    .remove(
      'hidden'
    );

  try {

    captureStream =
      await navigator
        .mediaDevices
        .getUserMedia({
          video: {
            facingMode:
              'environment'
          }
        });

    document
      .getElementById(
        'captureVideo'
      )
      .srcObject =
      captureStream;

  }
  catch(err){

    console.error(err);

    showMessage(
      'カメラ起動失敗',
      'error'
    );

  }

}
    function closeCaptureScreen() {

  if (captureStream) {

    captureStream
      .getTracks()
      .forEach(track =>
        track.stop()
      );

    captureStream = null;

  }

  document
    .getElementById(
      'captureModal'
    )
    .classList
    .add(
      'hidden'
    );

}
    async function captureFromModal() {

  const video =
    document.getElementById(
      'captureVideo'
    );

  if (
    !video ||
    video.readyState < 2
  ) {

    showMessage(
      'camera not ready',
      'error'
    );

    return;

  }

  const canvas =
    document.createElement(
      'canvas'
    );

  canvas.width =
    video.videoWidth;

  canvas.height =
    video.videoHeight;

  const ctx =
    canvas.getContext(
      '2d'
    );

  ctx.drawImage(
    video,
    0,
    0,
    canvas.width,
    canvas.height
  );

  const blob =
    await canvasToBlob(
      canvas,
      'image/jpeg',
      0.9
    );

  const assetNo =
    els.assetNo.value.trim();

  const seq =
    (assetCounters[
      assetNo
    ] || 0) + 1;

  assetCounters[
    assetNo
  ] = seq;

  const fileName =
    `${assetNo}_${seq}.jpg`;

  const datetime =
    formatDateTime(
      new Date()
    );

  imageStore.push({
    assetNo,
    seq,
    fileName,
    blob,
    datetime
  });

  inventoryRecords.push({
    assetNo,
    seq,
    fileName,
    datetime
  });

  await saveRecordToDB({

    record:{
      assetNo,
      seq,
      fileName,
      datetime
    },

    image:{
      assetNo,
      seq,
      fileName,
      blob,
      datetime
    }

  });

  closeCaptureScreen();

  updateUi();

  showMessage(
    fileName +
    ' saved',
    'success'
  );

}
    function bindEvents() {
      els.startCameraBtn.addEventListener('click', startCamera);
      els.stopCameraBtn.addEventListener('click', stopCamera);
      els.captureBtn.addEventListener(
  'click',
  openCaptureScreen
);
      els.nextAssetBtn.addEventListener('click', nextAsset);
      els.exportZipBtn.addEventListener('click', exportZip);
      els.resetBtn.addEventListener('click', resetAllData);
      els.assetNo.addEventListener('input', updateCurrentAssetCount);
      document
  .getElementById(
    'closeCaptureBtn'
  )
  .addEventListener(
    'click',
    closeCaptureScreen
  );
      document
  .getElementById(
    'shutterBtn'
  )
  .addEventListener(
    'click',
    captureFromModal
  );
    }

    async function startCamera() {
      if (isCameraRunning) {
        showMessage('カメラはすでに起動しています。', 'info');
        return;
      }

      if (!window.Html5Qrcode) {
        showMessage('html5-qrcodeライブラリを読み込めません。ネットワーク/CDN接続を確認してください。', 'error');
        return;
      }

      try {
        // reader内を初期化
        document.getElementById(readerId).innerHTML = '';
        html5QrCode = new Html5Qrcode(readerId);

        const config = {
          fps: 10,
          qrbox: function(viewfinderWidth, viewfinderHeight) {
            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
            const size = Math.floor(minEdge * 0.75);
            return { width: size, height: size };
          },
          aspectRatio: 1.7777778,
          disableFlip: false
        };

        await html5QrCode.start(
          { facingMode: 'environment' },
          config,
          onQrSuccess,
          onQrFailure
        );

        isCameraRunning = true;
        setCameraStatus(true);
        showMessage('カメラを起動しました。QRコードを読み取れます。', 'success');
      } catch (err) {
        console.error(err);
        isCameraRunning = false;
        setCameraStatus(false);
        showMessage('カメラ起動に失敗しました。権限、HTTPS環境、他アプリのカメラ使用状況を確認してください。', 'error');
      }
    }

    async function stopCamera() {
      if (!html5QrCode || !isCameraRunning) {
        setCameraStatus(false);
        showMessage('カメラは停止中です。', 'info');
        return;
      }

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
      } catch (err) {
        console.warn(err);
      } finally {
        html5QrCode = null;
        isCameraRunning = false;
        setCameraStatus(false);
        document.getElementById(readerId).innerHTML = '<div class="text-slate-300 text-sm flex items-center justify-center h-full">カメラ映像</div>';
        showMessage('カメラを停止しました。', 'info');
      }
    }

    function onQrSuccess(decodedText) {
      const value = String(decodedText || '').trim();
      if (!value) return;

      const before = els.assetNo.value.trim();
      els.assetNo.value = value;
      updateCurrentAssetCount();

      if (before !== value) {
        showMessage(`QR読取: ${value}`, 'success');
      }
    }

    function onQrFailure(_error) {
      // リアルタイムスキャンでは失敗が頻発するため、画面表示しない
    }

    async function capturePhoto() {
      const assetNo = els.assetNo.value.trim();
      if (!assetNo) {
        showMessage('資産番号を入力またはQR読取してください。', 'error');
        els.assetNo.focus();
        return;
      }

      const video = document.querySelector(`#${readerId} video`);
      if (!video || video.readyState < 2) {
        showMessage('カメラ映像が取得できません。先にカメラを起動してください。', 'error');
        return;
      }

      try {
        const canvas = document.createElement('canvas');
        const width = video.videoWidth || video.clientWidth;
        const height = video.videoHeight || video.clientHeight;
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, width, height);

        const blob = await canvasToBlob(canvas, 'image/jpeg', 0.9);
        if (!blob) throw new Error('画像Blob生成に失敗しました。');

        const seq = (assetCounters[assetNo] || 0) + 1;
        assetCounters[assetNo] = seq;

        const safeName = sanitizeFilePart(assetNo);
        const fileName = `${safeName}_${seq}.jpg`;
        const datetime = formatDateTime(new Date());

        imageStore.push({ assetNo, seq, fileName, blob, datetime });
        inventoryRecords.push({ assetNo, seq, fileName, datetime });
        await saveRecordToDB({

  record: {
    assetNo,
    seq,
    fileName,
    datetime
  },

  image: {
    assetNo,
    seq,
    fileName,
    blob,
    datetime
  }

});

        updateUi();
        showMessage(`撮影保存しました：${fileName}`, 'success');
      } catch (err) {
        console.error(err);
        showMessage('写真の撮影保存に失敗しました。', 'error');
      }
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise(resolve => canvas.toBlob(resolve, type, quality));
    }

    function nextAsset() {
      els.assetNo.value = '';
      updateCurrentAssetCount();
      els.assetNo.focus();
      showMessage('次の資産を入力またはスキャンしてください。', 'info');
    }

    async function exportZip() {
      if (inventoryRecords.length === 0 || imageStore.length === 0) {
        showMessage('出力対象データがありません。', 'error');
        return;
      }

      if (!window.JSZip) {
        showMessage('JSZipライブラリを読み込めません。ネットワーク/CDN接続を確認してください。', 'error');
        return;
      }

      try {
        els.exportZipBtn.disabled = true;
        els.exportZipBtn.textContent = 'Zip作成中...';

        const zip = new JSZip();
        const imageFolder = zip.folder('images');

        // CSV生成（Excel文字化け対策としてUTF-8 BOM付き）
        const csv = createCsv(inventoryRecords);
        zip.file('棚卸実績リスト.csv', csv);

        for (const img of imageStore) {
          imageFolder.file(img.fileName, img.blob);
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const today = formatDate(new Date());
        const zipName = `棚卸データ_${today}.zip`;

        downloadBlob(zipBlob, zipName);
        showMessage(`Zip出力しました：${zipName}`, 'success');
      } catch (err) {
        console.error(err);
        showMessage('Zip出力に失敗しました。', 'error');
      } finally {
        els.exportZipBtn.disabled = false;
        els.exportZipBtn.textContent = '棚卸しデータを全出力 (Zip)';
      }
    }

    function createCsv(records) {
      const header = ['資産番号', '撮影連番', 'ファイル名', '撮影日時'];
      const rows = records.map(r => [r.assetNo, r.seq, r.fileName, r.datetime]);
      const csvText = [header, ...rows]
        .map(row => row.map(csvEscape).join(','))
        .join('\r\n');
      return '\uFEFF' + csvText; // BOM付きUTF-8
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      if (/[",\r\n]/.test(str)) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function resetAllData() {
      if (inventoryRecords.length === 0 && imageStore.length === 0) {
        showMessage('リセット対象データはありません。', 'info');
        return;
      }

      const ok = confirm('メモリ内の棚卸し実績と写真データをすべて削除します。よろしいですか？');
      if (!ok) return;

      inventoryRecords = [];
      imageStore = [];
      assetCounters = {};
      els.assetNo.value = '';
      updateUi();
      showMessage('全データをリセットしました。', 'info');
    }

    function updateUi() {
      updateCurrentAssetCount();
      renderHistory();

      const uniqueAssets = new Set(inventoryRecords.map(r => r.assetNo));
      els.assetCountLabel.textContent = `資産 ${uniqueAssets.size}`;
      els.photoCountLabel.textContent = `写真 ${imageStore.length}`;
      els.recordCount.textContent = `${inventoryRecords.length}件`;
      els.exportZipBtn.disabled = inventoryRecords.length === 0;
    }

    function updateCurrentAssetCount() {
      const assetNo = els.assetNo.value.trim();
      const count = assetNo ? (assetCounters[assetNo] || 0) : 0;
      els.currentAssetPhotoCount.textContent = `${count} 枚`;
    }

    function renderHistory() {
      if (inventoryRecords.length === 0) {
        els.historyList.innerHTML = '<div class="text-sm text-slate-400 text-center py-6">撮影履歴はまだありません</div>';
        return;
      }

      const latestFirst = [...inventoryRecords].slice().reverse();
      els.historyList.innerHTML = latestFirst.map(r => `
        <div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <div class="font-bold text-sm truncate">${escapeHtml(r.assetNo)} <span class="text-blue-700">#${r.seq}</span></div>
              <div class="text-xs text-slate-500 truncate">${escapeHtml(r.fileName)}</div>
            </div>
            <div class="text-[11px] text-slate-500 whitespace-nowrap">${escapeHtml(r.datetime)}</div>
          </div>
        </div>
      `).join('');
    }

    function setCameraStatus(running) {
      if (running) {
        els.cameraStatus.textContent = '起動中';
        els.cameraStatus.className = 'text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-700';
      } else {
        els.cameraStatus.textContent = '停止中';
        els.cameraStatus.className = 'text-xs px-2 py-1 rounded-full bg-slate-200 text-slate-700';
      }
    }

    function showMessage(text, type) {
      const base = 'mt-3 rounded-lg px-3 py-2 text-sm';
      const styles = {
        success: 'bg-emerald-50 text-emerald-800 border border-emerald-200',
        error: 'bg-red-50 text-red-800 border border-red-200',
        info: 'bg-blue-50 text-blue-800 border border-blue-200'
      };
      els.message.className = `${base} ${styles[type] || styles.info}`;
      els.message.textContent = text;
      els.message.classList.remove('hidden');

      clearTimeout(showMessage._timer);
      showMessage._timer = setTimeout(() => {
        els.message.classList.add('hidden');
      }, 4500);
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}${m}${d}`;
    }

    function formatDateTime(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    function sanitizeFilePart(value) {
      // Windows / macOSで問題になりやすいファイル名文字を置換
      return String(value)
        .trim()
        .replace(/[\\/:*?"<>|]/g, '_')
        .replace(/\s+/g, '_')
        .slice(0, 80) || 'asset';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 画面離脱時の注意喚起（メモリ保持のため）
    window.addEventListener('beforeunload', (e) => {
      if (inventoryRecords.length > 0 || imageStore.length > 0) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
