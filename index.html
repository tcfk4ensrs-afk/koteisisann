<script>

/************************************************
 V5 Part1
 基本設定
 IndexedDB
************************************************/

const DB_NAME = "AssetInventoryDB";
const DB_VERSION = 1;
const STORE_NAME = "photos";

let db = null;

let qr = null;

let stream = null;

let tempBlob = null;

let tempImg = "";

let lastQr = "";
let lastQrTime = 0;
  /************************************************
 V5 Part2
 IndexedDB
 QR
 起動処理
 refresh
************************************************/

/***********************************************
 * IndexedDB 初期化
***********************************************/

async function initDB() {

    return new Promise((resolve, reject) => {

        const request =
            indexedDB.open(
                DB_NAME,
                DB_VERSION
            );

        request.onupgradeneeded =
            (event) => {

                const database =
                    event.target.result;

                if (
                    !database.objectStoreNames.contains(
                        STORE_NAME
                    )
                ) {

                    database.createObjectStore(
                        STORE_NAME,
                        {
                            keyPath: "id",
                            autoIncrement: true
                        }
                    );

                }

            };

        request.onsuccess =
            (event) => {

                db =
                    event.target.result;

                resolve();

            };

        request.onerror =
            () => {

                reject(
                    request.error
                );

            };

    });

}

/***********************************************
 * DB保存
***********************************************/

async function savePhotoToDB(
    photo
) {

    return new Promise((resolve, reject) => {

        const tx =
            db.transaction(
                STORE_NAME,
                "readwrite"
            );

        const store =
            tx.objectStore(
                STORE_NAME
            );

        const req =
            store.add(
                photo
            );

        req.onsuccess =
            () => resolve();

        req.onerror =
            () => reject(
                req.error
            );

    });

}

/***********************************************
 * DB全件取得
***********************************************/

async function loadPhotosFromDB() {

    return new Promise((resolve, reject) => {

        const tx =
            db.transaction(
                STORE_NAME,
                "readonly"
            );

        const store =
            tx.objectStore(
                STORE_NAME
            );

        const req =
            store.getAll();

        req.onsuccess =
            () => resolve(
                req.result
            );

        req.onerror =
            () => reject(
                req.error
            );

    });

}

/***********************************************
 * DB削除
***********************************************/

async function deletePhotoFromDB(
    id
) {

    return new Promise((resolve, reject) => {

        const tx =
            db.transaction(
                STORE_NAME,
                "readwrite"
            );

        const store =
            tx.objectStore(
                STORE_NAME
            );

        const req =
            store.delete(
                id
            );

        req.onsuccess =
            () => resolve();

        req.onerror =
            () => reject(
                req.error
            );

    });

}

/***********************************************
 * DB全削除
***********************************************/

async function clearDB() {

    return new Promise((resolve, reject) => {

        const tx =
            db.transaction(
                STORE_NAME,
                "readwrite"
            );

        const store =
            tx.objectStore(
                STORE_NAME
            );

        const req =
            store.clear();

        req.onsuccess =
            () => resolve();

        req.onerror =
            () => reject(
                req.error
            );

    });

}

/***********************************************
 * QR開始
***********************************************/

async function startQR() {

    if (qr) {

        return;

    }

    try {

        qr =
            new Html5Qrcode(
                "reader"
            );

        await qr.start(
            {
                facingMode:
                    "environment"
            },
            {
                fps: 10,
                qrbox: 220
            },
            onQRDetected
        );

        document
            .getElementById(
                "cameraStatus"
            )
            .innerText =
            "スキャン中";

    }
    catch (err) {

        console.error(err);

        alert(
            "QRカメラを起動できません"
        );

    }

}

/***********************************************
 * QR検出
***********************************************/

function onQRDetected(
    qrText
) {

    const now =
        Date.now();

    if (
        qrText === lastQr &&
        now - lastQrTime < 2000
    ) {

        return;

    }

    lastQr =
        qrText;

    lastQrTime =
        now;

    document
        .getElementById(
            "assetNo"
        )
        .value =
        qrText;

    refresh();

    openCamera();

}

/***********************************************
 * QR停止
***********************************************/

async function stopQR() {

    if (!qr) {

        return;

    }

    try {

        await qr.stop();

        await qr.clear();

    }
    catch (err) {

        console.error(err);

    }

    qr = null;

    document
        .getElementById(
            "cameraStatus"
        )
        .innerText =
        "停止中";

}

/***********************************************
 * 画面更新
***********************************************/

async function refresh() {

    const photos =
        await loadPhotosFromDB();

    const currentAsset =
        document
            .getElementById(
                "assetNo"
            )
            .value
            .trim();

    document
        .getElementById(
            "assetTotal"
        )
        .innerText =
        new Set(
            photos.map(
                p => p.assetNo
            )
        ).size;

    document
        .getElementById(
            "photoTotal"
        )
        .innerText =
        photos.length;

    const currentCount =
        photos.filter(
            p =>
                p.assetNo ===
                currentAsset
        ).length;

    document
        .getElementById(
            "count"
        )
        .innerText =
        currentCount;

}

/***********************************************
 * 画面イベント
***********************************************/

function wireEvents() {

    document
        .getElementById(
            "startQr"
        )
        .addEventListener(
            "click",
            startQR
        );

    document
        .getElementById(
            "stopQr"
        )
        .addEventListener(
            "click",
            stopQR
        );

}
  /************************************************
 V5 Part3
 カメラ
 撮影
 プレビュー
 保存
************************************************/

/***********************************************
 * カメラ起動
***********************************************/

async function openCamera() {

    const assetNo =
        document
            .getElementById(
                "assetNo"
            )
            .value
            .trim();

    if (!assetNo) {

        alert(
            "資産番号を入力してください"
        );

        return;
    }

    try {

        document
            .getElementById(
                "cameraModal"
            )
            .classList
            .remove(
                "hidden"
            );

        stream =
            await navigator
                .mediaDevices
                .getUserMedia({

                    video: {

                        facingMode: {
                            ideal:
                                "environment"
                        },

                        width: {
                            ideal:
                                1920
                        },

                        height: {
                            ideal:
                                1080
                        }

                    }

                });

        document
            .getElementById(
                "video"
            )
            .srcObject =
            stream;

    }
    catch (err) {

        console.error(err);

        alert(
            "カメラを起動できません"
        );

    }

}

/***********************************************
 * カメラ停止
***********************************************/

function stopCamera() {

    if (stream) {

        stream
            .getTracks()
            .forEach(track => {

                track.stop();

            });

        stream = null;

    }

    document
        .getElementById(
            "cameraModal"
        )
        .classList
        .add(
            "hidden"
        );

}

/***********************************************
 * シャッター
***********************************************/

async function capturePhoto() {

    const video =
        document.getElementById(
            "video"
        );

    const canvas =
        document.createElement(
            "canvas"
        );

    canvas.width =
        video.videoWidth;

    canvas.height =
        video.videoHeight;

    const ctx =
        canvas.getContext(
            "2d"
        );

    ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    tempImg =
        canvas.toDataURL(
            "image/jpeg",
            0.9
        );

    tempBlob =
        await (
            await fetch(
                tempImg
            )
        ).blob();

    stopCamera();

    document
        .getElementById(
            "previewImage"
        )
        .src =
        tempImg;

    document
        .getElementById(
            "previewModal"
        )
        .classList
        .remove(
            "hidden"
        );

}

/***********************************************
 * 撮り直し
***********************************************/

function retakePhoto() {

    document
        .getElementById(
            "previewModal"
        )
        .classList
        .add(
            "hidden"
        );

    openCamera();

}

/***********************************************
 * 保存
***********************************************/

async function savePhoto() {

    const assetNo =
        document
            .getElementById(
                "assetNo"
            )
            .value
            .trim();

    const photos =
        await loadPhotosFromDB();

    const seq =
        photos.filter(
            p =>
                p.assetNo === assetNo
        ).length + 1;

    const fileName =
        `${assetNo}_${seq}.jpg`;

    const record = {

        assetNo:
            assetNo,

        seq:
            seq,

        fileName:
            fileName,

        blob:
            tempBlob,

        thumbnail:
            tempImg,

        capturedAt:
            new Date()
                .toISOString()

    };

    await savePhotoToDB(
        record
    );

    document
        .getElementById(
            "previewModal"
        )
        .classList
        .add(
            "hidden"
        );

    await refresh();

    const again =
        confirm(
            "保存しました。\nもう1枚撮影しますか？"
        );

    if (again) {

        openCamera();

    }
    else {

        const next =
            confirm(
                "次の資産へ移動しますか？"
            );

        if (next) {

            document
                .getElementById(
                    "assetNo"
                )
                .value = "";

            refresh();
        }

    }

}

/***********************************************
 * 次の資産へ
***********************************************/

function moveNextAsset() {

    document
        .getElementById(
            "assetNo"
        )
        .value = "";

    refresh();

}

/***********************************************
 * カメライベント登録
***********************************************/

document
    .getElementById(
        "takePhoto"
    )
    .addEventListener(
        "click",
        openCamera
    );

document
    .getElementById(
        "shutter"
    )
    .addEventListener(
        "click",
        capturePhoto
    );

document
    .getElementById(
        "retake"
    )
    .addEventListener(
        "click",
        retakePhoto
    );

document
    .getElementById(
        "savePhoto"
    )
    .addEventListener(
        "click",
        savePhoto
    );

document
    .getElementById(
        "nextAsset"
    )
    .addEventListener(
        "click",
        moveNextAsset
    );
  /************************************************
 V5 Part4
 サムネイル
 実績リスト
 ZIP出力
 初期化
************************************************/

/***********************************************
 * 実績リスト
***********************************************/

async function renderTimeline() {

    const photos =
        await loadPhotosFromDB();

    const timeline =
        document.getElementById(
            "timeline"
        );

    if (
        photos.length === 0
    ) {

        timeline.innerHTML =
            `
            <div class="text-gray-500">

                撮影履歴はまだありません

            </div>
            `;

        return;
    }

    timeline.innerHTML =
        photos
        .slice()
        .reverse()
        .map(photo => {

            return `

            <div
                class="
                border-b
                py-2
                text-sm
                "
            >

                <div>

                    ${photo.assetNo}

                </div>

                <div>

                    ${photo.fileName}

                </div>

                <div class="text-xs text-gray-500">

                    ${formatDate(
                        photo.capturedAt
                    )}

                </div>

            </div>

            `;

        })
        .join("");

}

/***********************************************
 * 写真一覧
***********************************************/

async function renderPhotos() {

    const photos =
        await loadPhotosFromDB();

    const area =
        document.getElementById(
            "photos"
        );

    area.innerHTML =
        photos
        .map(photo => {

            return `

            <div
                class="
                bg-white
                rounded
                shadow
                p-1
                "
            >

                                    }"

                    class="
                    thumb-image
                    "

                    onclick="
                        showImage(
                            '${photo.thumbnail}'
                        )
                    "
                >

                <div
                    class="
                    text-xs
                    break-all
                    mt-1
                    "
                >

                    ${photo.fileName}

                </div>

                <button

                    onclick="
                        removePhoto(
                            ${photo.id}
                        )
                    "

                    class="
                        text-red-600
                        text-xs
                        mt-1
                    "

                >

                    削除

                </button>

            </div>

            `;

        })
        .join("");

}

/***********************************************
 * 写真拡大
***********************************************/

function showImage(
    src
) {

    document
        .getElementById(
            "viewerImage"
        )
        .src =
        src;

    document
        .getElementById(
            "imageViewer"
        )
        .classList
        .remove(
            "hidden"
        );

}

document
    .getElementById(
        "imageViewer"
    )
    .addEventListener(
        "click",
        () => {

            document
                .getElementById(
                    "imageViewer"
                )
                .classList
                .add(
                    "hidden"
                );

        }
    );

/***********************************************
 * 写真削除
***********************************************/

async function removePhoto(
    id
) {

    const result =
        confirm(
            "写真を削除しますか？"
        );

    if (!result) {

        return;
    }

    await deletePhotoFromDB(
        id
    );

    await refresh();

    await renderTimeline();

    await renderPhotos();

}

/***********************************************
 * CSV生成
***********************************************/

function createCSV(
    photos
) {

    let csv =
        "\ufeff資産番号,撮影連番,ファイル名,撮影日時\n";

    photos.forEach(photo => {

        csv +=
            `${photo.assetNo},` +
            `${photo.seq},` +
            `${photo.fileName},` +
            `${photo.capturedAt}\n`;

    });

    return csv;

}

/***********************************************
 * ZIP出力
***********************************************/

async function exportZIP() {

    const photos =
        await loadPhotosFromDB();

    if (
        photos.length === 0
    ) {

        alert(
            "出力対象がありません"
        );

        return;
    }

    const zip =
        new JSZip();

    const images =
        zip.folder(
            "images"
        );

    photos.forEach(photo => {

        images.file(
            photo.fileName,
            photo.blob
        );

    });

    zip.file(
        "棚卸実績リスト.csv",
        createCSV(
            photos
        )
    );

    const blob =
        await zip.generateAsync({
            type:"blob"
        });

    const link =
        document.createElement(
            "a"
        );

    link.href =
        URL.createObjectURL(
            blob
        );

    const now =
        new Date();

    const y =
        now.getFullYear();

    const m =
        String(
            now.getMonth() + 1
        ).padStart(
            2,
            "0"
        );

    const d =
        String(
            now.getDate()
        ).padStart(
            2,
            "0"
        );

    link.download =
        `棚卸データ_${y}${m}${d}.zip`;

    link.click();

}

/***********************************************
 * リセット
***********************************************/

async function resetAllData() {

    const result =
        confirm(
            "全データを削除しますか？"
        );

    if (!result) {

        return;
    }

    await clearDB();

    await refresh();

    await renderTimeline();

    await renderPhotos();

}

document
    .getElementById(
        "resetAll"
    )
    .addEventListener(
        "click",
        resetAllData
    );

/***********************************************
 * 日時整形
***********************************************/

function formatDate(
    value
) {

    const d =
        new Date(
            value
        );

    return d.toLocaleString(
        "ja-JP"
    );

}

/***********************************************
 * 起動処理
***********************************************/

document
.addEventListener(
    "DOMContentLoaded",
    async () => {

        try {

            await initDB();

            wireEvents();

            await refresh();

            await renderTimeline();

            await renderPhotos();

        }
        catch(err) {

            console.error(
                err
            );

            alert(
                "初期化エラー\n" +
                err.message
            );

        }

    }
);

/***********************************************
 * ZIPボタン
***********************************************/

document
    .getElementById(
        "exportZip"
    )
    .addEventListener(
        "click",
        exportZIP
    );

</script>
