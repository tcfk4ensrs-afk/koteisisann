<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>固定資産棚卸しV4</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>@media (orientation:landscape){#video{max-height:70vh;object-fit:contain}}</style>
</head><body class="bg-slate-100 p-3"><div class="max-w-md mx-auto">
<h1 class="text-xl font-bold mb-2">固定資産棚卸し V4</h1>
<input id="asset" class="border p-2 w-full" placeholder="資産番号">
<button id="photo" class="w-full bg-green-600 text-white p-3 mt-2 rounded">写真撮影</button>
<div id="list" class="mt-3"></div>
<button id="zip" class="w-full bg-indigo-700 text-white p-3 mt-3 rounded">ZIP出力</button>
</div>
<div id="cam" class="hidden fixed inset-0 bg-black flex flex-col justify-center"><video id="video" autoplay playsinline class="w-full"></video><button id="shot" class="bg-white m-2 p-3 rounded">撮影</button></div>
<script>
let db,stream,tempBlob;
const req=indexedDB.open('AssetInventoryDB',1);
req.onupgradeneeded=e=>{db=e.target.result;db.createObjectStore('photos',{keyPath:'id',autoIncrement:true});};
req.onsuccess=e=>{db=e.target.result;load();};
function addPhoto(r){return new Promise(res=>{let t=db.transaction(['photos'],'readwrite');t.objectStore('photos').add(r);t.oncomplete=()=>res();});}
function getPhotos(){return new Promise(res=>{let t=db.transaction(['photos']);let r=t.objectStore('photos').getAll();r.onsuccess=()=>res(r.result);});}
async function load(){let arr=await getPhotos();document.getElementById('list').innerHTML='保存数:'+arr.length;}
photo.onclick=async()=>{if(!asset.value.trim()) return alert('資産番号入力');cam.classList.remove('hidden');if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});video.srcObject=stream;};
shot.onclick=async()=>{let c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;c.getContext('2d').drawImage(video,0,0);tempBlob=await (await fetch(c.toDataURL('image/jpeg',0.9))).blob();let rec={assetNo:asset.value.trim(),fileName:asset.value.trim()+'_'+Date.now()+'.jpg',blob:tempBlob,dt:new Date().toISOString()};await addPhoto(rec);stream.getTracks().forEach(t=>t.stop());cam.classList.add('hidden');if(document.fullscreenElement) document.exitFullscreen();load();};
zip.onclick=async()=>{let arr=await getPhotos();let z=new JSZip();let img=z.folder('images');let csv='\ufeff資産番号,ファイル名,撮影日時\n';arr.forEach(a=>{img.file(a.fileName,a.blob);csv+=`${a.assetNo},${a.fileName},${a.dt}\n`;});z.file('棚卸実績リスト.csv',csv);let b=await z.generateAsync({type:'blob'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='棚卸データ.zip';a.click();};
</script></body></html>
