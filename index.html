<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>固定資産棚卸しV4完全版</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/html5-qrcode"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><style>@media(orientation:landscape){#camVideo{max-height:70vh;object-fit:contain}}</style></head><body class="bg-slate-100 p-3"><div class="max-w-md mx-auto space-y-3"><h1 class="text-xl font-bold">固定資産棚卸し V4 完全版</h1><div class="bg-white p-3 rounded"><div id="reader"></div><div class="flex gap-2 mt-2"><button id="startQR" class="flex-1 bg-blue-600 text-white p-2 rounded">QR開始</button><button id="stopQR" class="flex-1 bg-gray-600 text-white p-2 rounded">停止</button></div></div><div class="bg-white p-3 rounded"><input id="assetNo" class="border p-2 w-full" placeholder="資産番号"><div class="mt-2">撮影枚数:<span id="cnt">0</span></div><button id="openCam" class="w-full mt-2 bg-green-600 text-white p-3 rounded">写真を撮影</button></div><div class="bg-white p-3 rounded"><h2 class="font-bold">サマリ</h2><div id="summary"></div></div><div class="bg-white p-3 rounded"><h2 class="font-bold">履歴</h2><div id="timeline" class="text-xs"></div></div><div class="bg-white p-3 rounded"><h2 class="font-bold">写真</h2><div id="thumbs" class="grid grid-cols-3 gap-2"></div></div><button id="exportZip" class="w-full bg-indigo-700 text-white p-3 rounded">ZIP出力</button></div><div id="camModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center"><div class="bg-white p-3 w-11/12 rounded"><video id="camVideo" autoplay playsinline class="w-full"></video><button id="capture" class="w-full bg-green-600 text-white p-2 mt-2">撮影</button></div></div><div id="previewModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center"><div class="bg-white p-3 w-11/12 rounded"><img id="preview" class="w-full"><div class="flex gap-2 mt-2"><button id="savePhoto" class="flex-1 bg-blue-600 text-white p-2">保存</button><button id="retake" class="flex-1 bg-orange-500 text-white p-2">撮り直し</button></div></div></div><script>let db,stream,tempBlob,tempUrl,qr,last='',lastTime=0;const $=i=>document.getElementById(i);const req=indexedDB.open('AssetInvDB',1);req.onupgradeneeded=e=>e.target.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});req.onsuccess=e=>{db=e.target.result;refresh();};function all(){return new Promise(r=>{let q=db.transaction('photos').objectStore('photos').getAll();q.onsuccess=()=>r(q.result);});}async function refresh(){if(!db)return;let a=await all();let m={};a.forEach(x=>m[x.assetNo]=(m[x.assetNo]||0)+1);$('summary').innerHTML='資産数:'+Object.keys(m).length+'<br>写真数:'+a.length;$('timeline').innerHTML=a.slice().reverse().map(x=>x.assetNo+' '+x.dt).join('<br>');$('thumbs').innerHTML=a.map(x=>`<img src="${x.thumb}" class="h-20 object-cover">`).join('');let cur=$('assetNo').value.trim();$('cnt').innerText=m[cur]||0;}async function add(rec){return new Promise(res=>{let t=db.transaction('photos','readwrite');t.objectStore('photos').add(rec);t.oncomplete=()=>res();});}$('openCam').onclick=openCamera;async function openCamera(){if(!$('assetNo').value.trim()) return alert('資産番号入力');$('camModal').classList.remove('hidden');stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});$('camVideo').srcObject=stream;}function stopCam(){if(stream)stream.getTracks().forEach(t=>t.stop());$('camModal').classList.add('hidden');}$('capture').onclick=async()=>{let c=document.createElement('canvas');c.width=camVideo.videoWidth;c.height=camVideo.videoHeight;c.getContext('2d').drawImage(camVideo,0,0);tempUrl=c.toDataURL('image/jpeg',0.9);tempBlob=await(await fetch(tempUrl)).blob();stopCam();preview.src=tempUrl;previewModal.classList.remove('hidden');};retake.onclick=()=>{previewModal.classList.add('hidden');openCamera();};savePhoto.onclick=async()=>{let asset=assetNo.value.trim();let arr=await all();let seq=arr.filter(x=>x.assetNo===asset).length+1;await add({assetNo:asset,seq,fileName:`${asset}_${seq}.jpg`,blob:tempBlob,thumb:tempUrl,dt:new Date().toLocaleString('sv-SE')});previewModal.classList.add('hidden');refresh();setTimeout(()=>{if(confirm('もう1枚撮影しますか？'))openCamera();else assetNo.value='';},50);};startQR.onclick=async()=>{qr=new Html5Qrcode('reader');await qr.start({facingMode:'environment'},{fps:10,qrbox:220},txt=>{let n=Date.now();if(txt===last&&n-lastTime<2000)return;last=txt;lastTime=n;assetNo.value=txt;refresh();openCamera();});};stopQR.onclick=async()=>{if(qr){await qr.stop();await qr.clear();}};exportZip.onclick=async()=>{let data=await all();let z=new JSZip(),f=z.folder('images');let csv='﻿資産番号,撮影連番,ファイル名,撮影日時
';data.forEach(r=>{f.file(r.fileName,r.blob);csv+=`${r.assetNo},${r.seq},${r.fileName},${r.dt}
`;});z.file('棚卸実績リスト.csv',csv);let b=await z.generateAsync({type:'blob'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='棚卸データ.zip';a.click();};assetNo.oninput=refresh;</script></body></html>
