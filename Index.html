<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>固定資産棚卸しシステム V3</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head><body class="bg-slate-100">
<div class="max-w-md mx-auto p-3 space-y-3">
<h1 class="text-xl font-bold">固定資産棚卸しシステム V3</h1>
<div class="bg-white p-3 rounded shadow"><div id="reader"></div><div class="flex gap-2 mt-2"><button id="startQr" class="flex-1 bg-blue-600 text-white p-2 rounded">QR開始</button><button id="stopQr" class="flex-1 bg-gray-600 text-white p-2 rounded">停止</button></div></div>
<div class="bg-white p-3 rounded shadow"><input id="assetNo" class="w-full border p-2 rounded" placeholder="資産番号"><div class="mt-2">撮影枚数: <span id="count">0</span></div><button id="takePhoto" class="w-full mt-2 bg-green-600 text-white p-3 rounded">写真を撮影</button></div>
<div class="bg-white p-3 rounded shadow"><h2 class="font-bold">棚卸サマリ</h2><div id="summary"></div></div>
<div class="bg-white p-3 rounded shadow"><h2 class="font-bold">履歴</h2><div id="timeline" class="text-xs"></div></div>
<div class="bg-white p-3 rounded shadow"><h2 class="font-bold">写真一覧</h2><div id="photos" class="grid grid-cols-3 gap-2"></div></div>
<div class="bg-white p-3 rounded shadow"><button id="exportZip" class="w-full bg-indigo-700 text-white p-3 rounded">ZIP出力</button><button id="resetAll" class="mt-2 text-red-600 underline">全リセット</button></div></div>
<div id="cameraModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center"><div class="bg-white p-3 w-11/12 rounded"><video id="video" autoplay playsinline class="w-full rounded"></video><div class="flex gap-2 mt-2"><button id="shutter" class="flex-1 bg-green-600 text-white p-2 rounded">撮影</button><button id="closeCam" class="flex-1 bg-gray-500 text-white p-2 rounded">閉じる</button></div></div></div>
<div id="previewModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center"><div class="bg-white p-3 w-11/12 rounded"><img id="preview" class="w-full rounded"><div class="flex gap-2 mt-2"><button id="savePhoto" class="flex-1 bg-blue-600 text-white p-2">保存</button><button id="retake" class="flex-1 bg-orange-500 text-white p-2">撮り直し</button></div></div></div>
<div id="imageModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center" onclick="this.classList.add('hidden')"><img id="fullImage" class="max-h-full"></div>
<script>
const photos=[];const records=[];const counters={};let qr=null,stream=null,tempBlob=null,tempImg='';
const $=i=>document.getElementById(i);
function saveLS(){localStorage.setItem('assetInv',JSON.stringify({records,photos:photos.map(p=>({...p,blob:null})),counters}));}
function refresh(){const a=$('assetNo').value.trim();$('count').innerText=counters[a]||0;let s={};photos.forEach(p=>s[p.assetNo]=(s[p.assetNo]||0)+1);$('summary').innerHTML='資産数:'+Object.keys(s).length+'<br>写真数:'+photos.length+'<hr>'+Object.entries(s).map(v=>v[0]+' ('+v[1]+'枚)').join('<br>');$('timeline').innerHTML=[...records].reverse().map(r=>r.assetNo+' '+r.fileName+' '+r.datetime).join('<br>');$('photos').innerHTML=photos.map((p,i)=>`<div><img src="${p.thumb}" class="h-20 w-full object-cover rounded cursor-pointer" onclick="showImage('${p.thumb}')"><button class="text-xs text-red-600" onclick="deletePhoto(${i})">削除</button></div>`).join('');saveLS();}
window.showImage=s=>{$('fullImage').src=s;$('imageModal').classList.remove('hidden');}
window.deletePhoto=i=>{if(confirm('削除しますか？')){photos.splice(i,1);refresh();}}
async function openCamera(){if(!$('assetNo').value.trim()) return alert('資産番号を入力してください');$('cameraModal').classList.remove('hidden');stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});$('video').srcObject=stream;}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}$('cameraModal').classList.add('hidden');}
$('takePhoto').onclick=openCamera;$('closeCam').onclick=stopCamera;
$('shutter').onclick=async()=>{let c=document.createElement('canvas');c.width=$('video').videoWidth;c.height=$('video').videoHeight;c.getContext('2d').drawImage($('video'),0,0);tempImg=c.toDataURL('image/jpeg',0.9);tempBlob=await(await fetch(tempImg)).blob();$('preview').src=tempImg;stopCamera();$('previewModal').classList.remove('hidden');}
$('retake').onclick=()=>{$('previewModal').classList.add('hidden');openCamera();}
$('savePhoto').onclick=()=>{const asset=$('assetNo').value.trim();const seq=(counters[asset]||0)+1;counters[asset]=seq;const fn=`${asset}_${seq}.jpg`;const dt=new Date().toLocaleString('sv-SE');photos.push({assetNo:asset,seq,fileName:fn,blob:tempBlob,thumb:tempImg});records.push({assetNo:asset,seq,fileName:fn,datetime:dt});$('previewModal').classList.add('hidden');refresh();setTimeout(()=>{if(confirm('もう1枚撮影しますか？')) openCamera(); else if(confirm('次の資産へ移動しますか？')){$('assetNo').value='';refresh();}},100);};
$('startQr').onclick=async()=>{qr=new Html5Qrcode('reader');let last='',time=0;await qr.start({facingMode:'environment'},{fps:10,qrbox:200},txt=>{let n=Date.now();if(txt===last&&n-time<2000)return;last=txt;time=n;$('assetNo').value=txt;refresh();openCamera();});};
$('stopQr').onclick=async()=>{if(qr){await qr.stop();await qr.clear();qr=null;}};
$('exportZip').onclick=async()=>{let zip=new JSZip();let img=zip.folder('images');photos.forEach(p=>img.file(p.fileName,p.blob));let csv='\ufeff資産番号,撮影連番,ファイル名,撮影日時\n';records.forEach(r=>csv+=`${r.assetNo},${r.seq},${r.fileName},${r.datetime}\n`);zip.file('棚卸実績リスト.csv',csv);let b=await zip.generateAsync({type:'blob'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='棚卸データ_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.zip';a.click();};
$('resetAll').onclick=()=>{if(confirm('全データを削除しますか？')){localStorage.clear();location.reload();}};
refresh();
</script></body></html>
